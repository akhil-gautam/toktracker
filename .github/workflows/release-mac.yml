name: Release Mac app

on:
  push:
    tags:
      - 'mac-v*'
  workflow_dispatch:

env:
  APP_NAME: Tokscale
  BUNDLE_ID: com.tokscale.Tokscale

jobs:
  build:
    runs-on: macos-14
    permissions:
      contents: write
    defaults:
      run:
        working-directory: menubar-app
    steps:
      - uses: actions/checkout@v4

      - name: Pick Xcode
        run: |
          set -euo pipefail
          # Pin to an Xcode that defaults to Swift 5 language mode. Newer
          # Xcode 16 images enforce Swift 6 strict concurrency which the
          # app's SwiftUI/@Observable model does not yet satisfy.
          for candidate in Xcode_15.4 Xcode_15.3 Xcode_15.2; do
            if [ -d "/Applications/$candidate.app" ]; then
              sudo xcode-select -s "/Applications/$candidate.app"
              xcodebuild -version
              exit 0
            fi
          done
          echo "::error::No Xcode 15.x found on runner"
          ls /Applications | grep -i xcode || true
          exit 1

      - name: Import Developer ID certificate
        env:
          CERT_P12_BASE64: ${{ secrets.DEVELOPER_ID_APPLICATION_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_APPLICATION_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN=build.keychain
          KEYCHAIN_PWD=$(openssl rand -hex 32)
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          echo "$CERT_P12_BASE64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          security import "$CERT_PATH" -k "$KEYCHAIN" -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/productbuild
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PWD" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')

          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN" \
            | awk -F\" '/Developer ID Application/ {print $2; exit}')
          if [ -z "$IDENTITY" ]; then
            echo "::error::No Developer ID Application identity found in keychain"
            security find-identity -v -p codesigning "$KEYCHAIN"
            exit 1
          fi
          echo "CODESIGN_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"

      - name: Build .app bundle
        run: ./scripts/build-app.sh release

      - name: Codesign with hardened runtime
        env:
          IDENTITY: ${{ env.CODESIGN_IDENTITY }}
        run: |
          set -euo pipefail
          APP="build/${APP_NAME}.app"
          # Sign nested executables first, then the bundle itself.
          for bin in "$APP/Contents/MacOS/"*; do
            codesign --force --options runtime --timestamp \
              --sign "$IDENTITY" "$bin"
          done
          codesign --force --options runtime --timestamp --deep \
            --sign "$IDENTITY" "$APP"
          codesign --verify --strict --verbose=2 "$APP"

      - name: Notarize + staple
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          set -euo pipefail
          APP="build/${APP_NAME}.app"
          ZIP_FOR_NOTARY="$RUNNER_TEMP/${APP_NAME}-notary.zip"
          ditto -c -k --keepParent "$APP" "$ZIP_FOR_NOTARY"

          xcrun notarytool submit "$ZIP_FOR_NOTARY" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --wait

          xcrun stapler staple "$APP"
          xcrun stapler validate "$APP"

      - name: Package release zip + checksum
        id: package
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#mac-v}"
          if [ "$GITHUB_REF_NAME" = "$VERSION" ]; then
            VERSION="dev-$(git rev-parse --short HEAD)"
          fi
          OUT="${APP_NAME}-${VERSION}.zip"
          ditto -c -k --keepParent "build/${APP_NAME}.app" "build/$OUT"
          (cd build && shasum -a 256 "$OUT" > "$OUT.sha256")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "asset=$OUT" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/mac-v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          VERSION="${{ steps.package.outputs.version }}"
          ASSET="${{ steps.package.outputs.asset }}"
          gh release create "$GITHUB_REF_NAME" \
            --title "${APP_NAME} ${VERSION}" \
            --notes "Signed + notarized Mac app build for ${VERSION}." \
            "build/$ASSET" "build/$ASSET.sha256"

      - name: Upload artifact (for workflow_dispatch)
        if: startsWith(github.ref, 'refs/tags/mac-v') == false
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-build
          path: menubar-app/build/*.zip*
